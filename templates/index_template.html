<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#121212" />
    <link rel="canonical" href="https://radityamahatma.my.id" />
    <meta name="description" content="{{ description }}">
    <meta name="keywords" content="{{ keywords }}">
    <link rel="icon" type="image/svg+xml" href="{{ root_dir }}images/favicon.svg">
    <title>{{ title }}</title>
    <style>

        /* FONTS THINGS */
        @font-face {
            font-family: 'Junicode';
            src: url('{{ root_dir }}fonts/JunicodeVF-Roman.woff2') format('woff2');
            font-weight: 300 700;
            font-style: normal;
            font-display: swap;
        }
        
        @font-face {
            font-family: 'Junicode';
            src: url('{{ root_dir }}fonts/JunicodeVF-Italic.woff2') format('woff2');
            font-weight: 300 700;
            font-style: italic;
            font-display: swap;
        }

        :root {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --link-color: #D3F6FF;
            --border-color: #333333;
            --muted-text: #888888;
        }

        html { font-size: 100%; }

        p, d1, ol, ul {
          font-size: 1.1rem;
          line-height: 1.5rem;
        }

        p {
          text-align: justify;
          text-align-last: left;
          hyphens: auto;
        }

        body {
            /* font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; */
            font-family: et-book, Palatino, "Palatino Linotype", "Palatino LT STD", "Book Antiqua", Georgia, "Times New Roman", serif;
            line-height: 1.5rem;
            color: var(--text-color);
            background-color: var(--bg-color);
            max-width: 680px; 
            margin: 0 auto;
            padding: 2rem 1.5rem; /* Slightly wider side padding on desktop */
        }

        h1 {
            font-family: "Junicode", Georgia, "Times New Roman", serif;
            line-height: 1.2;
            margin-top: 2rem;
            margin-bottom: 2rem;
            font-weight: 700;
            color: #ffffff;
            font-size: 2.2rem;
        }

        h2 {
            font-family: "Junicode", Georgia, "Times New Roman", serif;
            line-height: 1.1rem;
            margin-top: 2rem;
            margin-bottom: 2rem;
            font-weight: 600;
            color: var(--link-color);
            font-size: 1.8rem;
        }

        a { color: var(--link-color); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* Index List Styling */
        ul.index-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        
        ul.index-list li {
            margin-bottom: 0.8rem;
            font-size: 1.1rem;
        }

        .pinned-post a {
            font-weight: 600;
            border-bottom: 1px dashed var(--muted-text);
            text-decoration: none;
        }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 600px) {
            body {
                padding: 1.5rem 1rem;
            }
            h1 {
                font-size: 1.8rem;
                margin-top: 1rem;
            }
            ul.index-list li {
                font-size: 1rem;
                padding: 0.3rem 0;
            }
        }
    </style>
</head>
  <body>
    <main>
        <h1>{{ title }}</h1>
        {{ content }}
    </main>

    <footer style="margin-top: 4rem; padding-top: 1rem; border-top: 1px solid var(--border-color); font-size: 0.8em; color: var(--muted-text);">
        Built with <a href="https://github.com/SiputBiru/cangkang" target="_blank" rel="noopener noreferrer">Cangkang</a>.<br>
        © 2026-present siputbiru
    </footer>
</body>
</html>
