<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#121212" />
    <title>{{ title }}</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --link-color: #D3F6FF;
            --border-color: #333333;
            --muted-text: #888888;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--bg-color);
            max-width: 680px; 
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        h1 {
            line-height: 1.2;
            margin-top: 2rem;
            margin-bottom: 2rem;
            font-weight: 600;
            color: #ffffff;
        }

        a { color: var(--link-color); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* Index List Styling */
        ul.index-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        
        ul.index-list li {
            margin-bottom: 0.8rem;
            font-size: 1.1rem;
        }

        .pinned-post a {
            font-weight: 600;
            border-bottom: 1px dashed var(--muted-text);
            text-decoration: none;
        }
    </style>
</head>
  <body>
    <main>
        <h1>{{ title }}</h1>
        {{ content }}
    </main>

    <footer style="margin-top: 4rem; padding-top: 1rem; border-top: 1px solid var(--border-color); font-size: 0.8em; color: var(--muted-text);">
        Built with <a href="https://github.com/SiputBiru/cangkang" target="_blank" rel="noopener noreferrer">Cangkang</a>.<br>
        © 2026-present siputbiru
    </footer>
</body>
</html>
